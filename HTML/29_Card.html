<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD 2</title>
    <link rel="stylesheet" href="../CSS/29_Card.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="../MEDIA/FLOWER.png" alt="ABC">

            <div class="textBox">
                <h1>Order Summary</h1 >

                <p>
                    Lorem ipsum dolor sit amet consectetur adipisicing elit. Fugiat 
                    reiciendis nemo omnis consequuntur odio repellendus dicta deleniti aut 
                    cum ipsa.
                </p>
        
            </div>

            <div id="amountBox">

                <div class="leftBox">

                    <div class="imageBox">
                        <img src="../MEDIA/Logo.png" alt="Logo">
                    </div>

                    <div class="paraBox">
                         <p>Amount</p>
                         <p>$99.99/year</p>
                    </div>
                    
                </div>

                <div class="rightBox">
                    <a href="#">Change</a>
                </div>

            </div>

            <button id="paymentButton">Proceed to Payment</button>

            <div class="cancelBox">
                <a href="#">Cancel Order</a>
            </div>
        </div>
    </div>
</body>
</html>
