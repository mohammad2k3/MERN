<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>
                <h1>JOB APPLICATION</h1>
            </legend>
            <label for="name">Name :</label>
            <input type="text" id="name">
            <br>
            <br>
            <label for="email">Email :</label>
            <input type="email" id="email">
            <br>
            <br>
            <label for="phone">Phone :</label>
            <input type="tel" id="phone">
            <br>
            <br>
            <label for="resume">Resume :</label>
            <input type="file" id="resume">
            <br>
            <br>
            <label for="experience">Experience (years) :</label>
            <input type="number" min="0" max="40" id="experience">
            <br>
            <br>
            <fieldset>
                <legend>Skills</legend>
                <input type="checkbox" id="checkbox 1">
                <label for="checkbox 1">HTML</label>
                <input type="checkbox" id="checkbox 2">
                <label for="checkbox 2">CSS</label>
                <input type="checkbox" id="checkbox 3">
                <label for="checkbox 3">JAVA</label>
            </fieldset>
            <br>
            <label for="qualifiaction">Highest Education :</label>
            <select id="qualifiaction">
                <option selected disabled>choose option</option>
                <option>High School</option>
                <option>Graduation</option>
                <option>Master</option>
                <option>PhD</option>
            </select>
            <br>
            <br>
            <fieldset>
                <legend>Availability</legend>
                <input type="radio" id="radio 1" name="a">
                <label for="radio 1">Full-Time</label>
                <input type="radio" id="radio 2" name="a">
                <label for="radio 2">Part-Time</label>
            </fieldset>
            <br>
            <label for="comments">Comment Area :</label>
            <br>
            <br>
            <textarea id="comments"></textarea>
            <input type="submit" value="Submit Application">
        </fieldset>
    </form>
</body>
</html>
