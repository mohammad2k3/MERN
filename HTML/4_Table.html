<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table 4</title>
</head>
<body>
    <table border="2" align="center">
        <thead align="center">
            <th>Column 1</th>
            <th>Column 2</th>
            <th>Column 3</th>
        </thead>
        <tbody>
            <tr align="center">
                <td rowspan="2">R1,C1</td>
                <td>R1,C2</td>
                <td>R1,C3</td>
            </tr>
            <tr align="center">
                <td>R2,C2</td>
                <td>R2,C3</td>
            </tr>
        </tbody>
        <tfoot>
            <tr align="center">
                <td colspan="3">R3,C1</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
