<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <fieldset>
            <legend align = "center">DUMMY FORM</legend>
            <label for="name">Name :</label>
            <input type="text" id="name" placeholder="enter name">
            <br>
            <br>
            <label for="dob">DOB :</label>
            <input type="date" name="" id="dob" placeholder="enter dob">
            <br>
            <br>
            <label for="gender">Gender :</label>
            <select id="gender" multiple size="2">
                <option selected disabled>Choose an option</option>
                <option>male</option>
                <option>female</option>
                <option>other</option>
            </select>
            <br>
            <br>
            <label for="email">Log in :</label>
            <input type="email" id="email" placeholder="enter email">
            <br>
            <br>
            <label for="password">Password :</label>
            <input type="password" id="password" placeholder="enter password">
            <br>
            <br>
            <label for="text">feedback :</label>
            <textarea id="text" placeholder="give your feedback" rows="10" 
            cols="20"></textarea>
            <br>
            <br>
            <input type="submit" value="Click Here">
        </fieldset>
    </form>
</body>
</html>
